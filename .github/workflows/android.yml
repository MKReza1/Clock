name: Android CI - Build APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found. Creating a standard debug keystore as fallback..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Prepare Secrets Configuration
        run: |
          # The Secrets Gradle Plugin expects a .env or .env.example file.
          # We check if .env exists, if not, copy .env.example to .env
          if [ ! -f ".env" ]; then
            if [ -f ".env.example" ]; then
              cp .env.example .env
            else
              touch .env
            fi
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Heal Gradle Wrapper (Fixes git/crlf corruption or broken jar issues)
        run: |
          if command -v gradle >/dev/null 2>&1; then
            echo "Regenerating wrapper via runner's system gradle..."
            gradle wrapper
          else
            echo "System gradle not found on runner. Fetching pristine official gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -sL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew
        # Though our environment runs gradle directly, the standard github-runner VM uses the gradle wrapper.
        # We ensure executable rights are granted just in case.

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarm-clock-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Check if Release Signing Secrets are Configured
        id: check_secrets
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.STORE_PASSWORD }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "is_signed_release_ready=true" >> $GITHUB_OUTPUT
            echo "Release secrets found! Building and signing the release APK..."
          else
            echo "is_signed_release_ready=false" >> $GITHUB_OUTPUT
            echo "Missing release secrets. Will only capture debug build."
          fi

      - name: Prepare Release Keystore and Build Release APK
        if: steps.check_secrets.outputs.is_signed_release_ready == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > my-upload-key.jks
          ./gradlew assembleRelease
          # my-upload-key.jks is created in the root directory, matches rootDir/my-upload-key.jks expected in build.gradle.kts

      - name: Upload Release APK Artifact
        if: steps.check_secrets.outputs.is_signed_release_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: alarm-clock-release-apk
          path: app/build/outputs/apk/release/app-release.apk
